### model
model_name_or_path: Qwen/Qwen2.5-7B-Instruct
quantization_bit: 4

### method
stage: sft
do_train: true
finetuning_type: lora
lora_target: q_proj,v_proj
lora_rank: 8
lora_alpha: 16

### dataset
dataset: hellaswag_train
template: qwen
cutoff_len: 1024
max_samples: 20000
overwrite_cache: true
preprocessing_num_workers: 8

### Baseline settings (Normal training)
use_robust_tuning: false
use_sa_paft: false

### training
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
fp16: true

### output
output_dir: output/reproduction_baseline
logging_steps: 10
save_steps: 100
plot_loss: true
overwrite_output_dir: true
